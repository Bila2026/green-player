<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />

        <meta name="theme-color" content="#2ecc71" />

        <meta
            name="description"
            content="Green Player Ultimate: Player de música com equalizador de 10 bandas, visualizador dinâmico e suporte a playlists locais."
        />
        <meta
            name="keywords"
            content="music player, web audio, equalizer, visualizer, pwa, green player"
        />
        <meta name="author" content="Seu Usuário GitHub" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="🔊 Green Player Ultimate" />
        <meta
            property="og:description"
            content="Ouça suas músicas com equalizador profissional e visualizador dinâmico direto no navegador."
        />
        <meta
            property="og:url"
            content="https://Bila2026.github.io/green-player/"
        />
        <meta
            property="og:image"
            content="https://Bila2026.github.io/green-player/icons/og-image.png"
        />
        <meta name="twitter:card" content="summary_large_image" />  
        <meta name="twitter:title" content="🔊 Green Player Ultimate" />
        <meta
            name="twitter:description"
            content="Equalizador de 10 bandas e presets customizados para Funk, Techno e mais."
        />
        <meta
            name="twitter:image"
            content="https://Bila2026.github.io/green-player/icons/og-image.png"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Green Player" />

        <title>🔊 Green Player Ultimate</title>
        <link rel="manifest" href="manifest.json" />
        <link
            href="https://fonts.googleapis.com/css2?family=Bad+Script&family=Lato:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./assets/style.css" />
        <link rel="icon" href="icons/favicon.ico" type="image/x-icon" />
    </head>

    <body>
        <div class="player">
            <div id="cover">
                <div id="cover-img"></div>
                <video id="bg-video" loop muted playsinline preload="auto">
                    <source src="video.mp4" type="video/mp4" />
                </video>
                <span id="cover-icon">♪</span>
            </div>

            <h3 id="title">Sua Playlist</h3>
            <p id="artist">Selecione arquivos para começar</p>

            <div id="playlist-container">
                <ul id="playlist"></ul>
            </div>

            <div class="upload-wrapper">
                <input type="file" id="upload" accept="audio/*" multiple />
                <div class="upload-button">Adicionar Músicas</div>
            </div>

            <audio id="audio" controls></audio>
            <canvas id="visualizer"></canvas>

            <div class="equalizer">
                <label
                    >31<input
                        type="range"
                        data-band="0"
                        min="-15"
                        max="15"
                        value="0"
                    />1</label
                >
                <label
                    >62<input
                        type="range"
                        data-band="1"
                        min="-15"
                        max="15"
                        value="0"
                    />2</label
                >
                <label
                    >125<input
                        type="range"
                        data-band="2"
                        min="-15"
                        max="15"
                        value="0"
                    />3</label
                >
                <label
                    >250<input
                        type="range"
                        data-band="3"
                        min="-15"
                        max="15"
                        value="0"
                    />4</label
                >
                <label
                    >500<input
                        type="range"
                        data-band="4"
                        min="-15"
                        max="15"
                        value="0"
                    />5</label
                >
                <label
                    >1k<input
                        type="range"
                        data-band="5"
                        min="-15"
                        max="15"
                        value="0"
                    />6</label
                >
                <label
                    >2k<input
                        type="range"
                        data-band="6"
                        min="-15"
                        max="15"
                        value="0"
                    />7</label
                >
                <label
                    >4k<input
                        type="range"
                        data-band="7"
                        min="-15"
                        max="15"
                        value="0"
                    />8</label
                >
                <label
                    >8k<input
                        type="range"
                        data-band="8"
                        min="-15"
                        max="15"
                        value="0"
                    />9</label
                >
                <label
                    >16k<input
                        type="range"
                        data-band="9"
                        min="-15"
                        max="15"
                        value="0"
                    />0</label
                >
            </div>

            <select name="preset" id="preset">
                <option value="flat">Default</option>
                <optgroup label="Pessoal">
                    <option value="techno">Techno</option>
                    <option value="lenta">Relax</option>
                    <option value="batidao">Tremor</option>
                </optgroup>
                <optgroup label="Gêneros">
                    <option value="bass">Bass Boost</option>
                    <option value="rock">Rock</option>
                    <option value="pop">Pop</option>
                    <option value="jazz">Jazz</option>
                    <option value="acoustic">Acoustic</option>
                    <option value="dance">Dance</option>
                </optgroup>
                <optgroup label="Funk">
                    <option value="funk">Funk</option>
                    <option value="funk_heavy">Funk Heavy</option>
                    <option value="funky_melody">Funk Melody</option>
                </optgroup>
            </select>
        </div>

        <script src="./jsmediatags/dist/jsmediatags.min.js"></script>
        <script src="./assets/player.js"></script>
    </body>
</html>
